services:
  postgres:
    image: postgres:17-alpine
    container_name: pos-postgres
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: pos_local
    ports:
      - "5432:5432"
    volumes:
      - pos-pgdata:/var/lib/postgresql/data
      - ./docker/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pos-pgdata:
